name: Quality

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.3'
          - '8.4'
          - '8.5'
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
      - uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-
      - run: composer validate --strict
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: composer qa

  node:
    name: JavaScript and CSS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run qa

  i18n:
    name: Translation catalogue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: wp-cli:2.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run i18n:check

  release:
    name: Release archive and Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:release
      - uses: wordpress/plugin-check-action@v1
        with:
          build-dir: .release/wp-simple-events
          slug: wp-simple-events
          strict: true
      - uses: actions/upload-artifact@v4
        with:
          name: wp-simple-events-release
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  smoke:
    name: WordPress ${{ matrix.wordpress }} smoke test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - wordpress: '6.9'
            core: WordPress/WordPress#6.9
          - wordpress: '7.0.1'
            core: WordPress/WordPress#7.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: npm ci
      - run: npm run build:release
      - run: npm run test:smoke
        env:
          WPSE_SMOKE_CORE: ${{ matrix.core }}
          WPSE_SMOKE_PLUGIN_PATH: .release/wp-simple-events
